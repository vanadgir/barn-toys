<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>barn midi</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;700&display=swap');

    :root {
      --bg:       #080c10;
      --bg2:      #0b1017;
      --bg3:      #0e1620;
      --accent:   #c8a84b;
      --accent2:  #4b8bc8;
      --text:     #c8c8bc;
      --muted:    #3d4a55;
      --border:   #141e28;
      --wkey:     #121c26;
      --bkey:     #080e14;
      --note:     #c8a84b;
      --note-new: #ffe088;
      --head:     rgba(75,139,200,0.9);
      --l0: #c8a84b;
      --l1: #4b8bc8;
      --l2: #5ca87a;
      --l3: #c8604b;
      --l4: #a04bc8;
      --l5: #c8b04b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── header ── */
    .hdr {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
      z-index: 10;
    }

    .hdr-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
    }
    .hdr-title span { color: var(--accent); }

    .hdr-sep { color: var(--muted); font-size: 0.7rem; }

    .hdr-sf, .hdr-inst {
      font-size: 0.65rem;
      color: var(--text);
      letter-spacing: 0.04em;
    }
    .hdr-inst { color: var(--accent); }

    .hdr-bpm {
      font-size: 0.65rem;
      color: var(--muted);
    }
    .hdr-bpm span { color: var(--text); }

    .hdr-status {
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      padding: 3px 10px;
      border-radius: 3px;
      border: 1px solid transparent;
      transition: all 0.3s;
    }
    .hdr-status.idle       { color: var(--muted); border-color: var(--border); }
    .hdr-status.composing  { color: var(--accent); border-color: rgba(200,168,75,0.4); }
    .hdr-status.rendering  { color: var(--accent2); border-color: rgba(75,139,200,0.4); animation: pulse 1s infinite; }
    .hdr-status.playing    { color: #5ca85c; border-color: rgba(92,168,92,0.4); }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .hdr-label {
      font-size: 0.6rem;
      color: var(--muted);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hdr-back {
      font-size: 0.6rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .hdr-back:hover { color: var(--text); }

    /* ── tab bar ── */
    .tab-bar {
      display: flex;
      align-items: stretch;
      gap: 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
      padding: 0 20px;
    }

    .tab-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 7px 16px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── tab panels ── */
    .tab-panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .tab-panel.active { display: flex; }

    /* ── main layout (live tab) ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── piano keys ── */
    .keys {
      width: 48px;
      flex-shrink: 0;
      overflow: hidden;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .key {
      flex-shrink: 0;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 5px;
      font-size: 0.45rem;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }
    .key.white { background: var(--wkey); color: #2a3a4a; }
    .key.black { background: var(--bkey); color: #1a2530; }
    .key.c     { border-top: 1px solid rgba(75,139,200,0.25); color: #2a3f55; }
    .key:hover { filter: brightness(1.5); }

    /* ── scroll + grid ── */
    .grid-wrap {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      position: relative;
    }

    .grid-inner {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      position: relative;
    }

    .grid-row {
      display: flex;
      height: 14px;
      flex-shrink: 0;
      position: relative;
    }

    .cell {
      width: 40px;
      height: 14px;
      flex-shrink: 0;
      border-right: 1px solid rgba(20,30,40,0.6);
      border-bottom: 1px solid rgba(20,30,40,0.4);
      position: relative;
      cursor: pointer;
      transition: background 0.08s;
    }

    .grid-row.is-black .cell { background: rgba(0,0,0,0.12); }
    .cell.bar-start    { border-left: 2px solid rgba(75,139,200,0.18); }
    .cell.beat-start   { border-left: 1px solid rgba(75,139,200,0.1); }

    .cell:hover { background: rgba(200,168,75,0.12) !important; }

    /* placed notes */
    .cell.on { box-shadow: 0 0 4px rgba(0,0,0,0.3); }
    .cell.on::after {
      content: '';
      position: absolute;
      top: 1px; left: 1px; right: 1px;
      height: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 1px;
    }
    .cell.on[data-layer="0"] { background: rgba(200,168,75,0.78) !important; }
    .cell.on[data-layer="1"] { background: rgba(75,139,200,0.78) !important; }
    .cell.on[data-layer="2"] { background: rgba(92,168,122,0.78) !important; }
    .cell.on[data-layer="3"] { background: rgba(200,96,75,0.78)  !important; }
    .cell.on[data-layer="4"] { background: rgba(160,75,200,0.78) !important; }
    .cell.on[data-layer="5"] { background: rgba(200,176,75,0.78) !important; }

    /* flash per layer */
    @keyframes flash0 { 0%{background:rgba(255,224,136,.95)!important;box-shadow:0 0 12px rgba(255,224,136,.8)} 100%{background:rgba(200,168,75,.78)!important} }
    @keyframes flash1 { 0%{background:rgba(136,200,255,.95)!important;box-shadow:0 0 12px rgba(136,200,255,.8)} 100%{background:rgba(75,139,200,.78)!important} }
    @keyframes flash2 { 0%{background:rgba(136,255,176,.95)!important;box-shadow:0 0 12px rgba(136,255,176,.8)} 100%{background:rgba(92,168,122,.78)!important} }
    @keyframes flash3 { 0%{background:rgba(255,160,136,.95)!important;box-shadow:0 0 12px rgba(255,160,136,.8)} 100%{background:rgba(200,96,75,.78)!important}  }
    @keyframes flash4 { 0%{background:rgba(216,136,255,.95)!important;box-shadow:0 0 12px rgba(216,136,255,.8)} 100%{background:rgba(160,75,200,.78)!important} }
    @keyframes flash5 { 0%{background:rgba(255,240,136,.95)!important;box-shadow:0 0 12px rgba(255,240,136,.8)} 100%{background:rgba(200,176,75,.78)!important} }
    .cell.flash[data-layer="0"] { animation: flash0 0.5s ease-out forwards; }
    .cell.flash[data-layer="1"] { animation: flash1 0.5s ease-out forwards; }
    .cell.flash[data-layer="2"] { animation: flash2 0.5s ease-out forwards; }
    .cell.flash[data-layer="3"] { animation: flash3 0.5s ease-out forwards; }
    .cell.flash[data-layer="4"] { animation: flash4 0.5s ease-out forwards; }
    .cell.flash[data-layer="5"] { animation: flash5 0.5s ease-out forwards; }

    /* tooltip */
    .note-tip {
      position: fixed;
      background: rgba(8,12,16,0.95);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.58rem;
      padding: 4px 8px;
      border-radius: 3px;
      pointer-events: none;
      display: none;
      z-index: 100;
      white-space: nowrap;
      letter-spacing: 0.04em;
    }
    .note-tip .tip-note { color: #fff; font-weight: 700; }
    .note-tip .tip-inst { color: var(--muted); }

    /* live info bar */
    .live-info-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.65rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    .live-info-bar .hdr-sf,
    .live-info-bar .hdr-inst { color: var(--text); }
    .live-info-bar .hdr-bpm span { color: var(--text); }
    .live-info-bar .hdr-label { color: var(--accent); font-size: 0.6rem; }
    .live-info-bar .hdr-sep { color: var(--muted); }
    .live-info-bar .live-spacer { flex: 1; }
    .live-info-bar .hdr-status {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .live-info-bar .hdr-status.idle     { color: var(--muted); }
    .live-info-bar .hdr-status.composing { color: var(--accent); }
    .live-info-bar .hdr-status.rendering { color: #4b8bc8; }
    .live-info-bar .hdr-status.playing  { color: #5ca87a; }

    /* layer legend */
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      padding: 5px 20px 5px 68px;
      border-bottom: 1px solid var(--border);
      min-height: 22px;
      flex-shrink: 0;
      background: var(--bg);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.58rem;
      color: var(--muted);
    }
    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* playhead */
    .playhead {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--head);
      box-shadow: 0 0 8px rgba(75,139,200,0.7);
      pointer-events: none;
      display: none;
      z-index: 5;
    }

    /* ── footer ── */
    .ftr {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 6px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.58rem;
      color: var(--muted);
      flex-shrink: 0;
      background: var(--bg);
    }
    .ftr span { color: var(--text); }
    .ftr-note-count::before { content: 'notes: '; }

    /* idle state overlay */
    .idle-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.5s;
    }
    .idle-overlay.hidden { opacity: 0; }
    .idle-overlay .idle-text {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
    .idle-overlay .idle-sub {
      font-size: 0.55rem;
      color: #2a3a4a;
    }

    /* volume */
    .vol-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }
    .vol-wrap input {
      width: 70px;
      accent-color: var(--accent2);
    }

    /* scrollbar */
    ::-webkit-scrollbar { height: 4px; width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ═══════════════════════════════════════════════════════════════
       EDITOR TAB
       ═══════════════════════════════════════════════════════════════ */

    .editor-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    /* ── toolbar ── */
    .ed-toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px 14px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .ed-group {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .ed-label {
      font-size: 0.55rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .ed-select, .ed-input {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--text);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 3px 6px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .ed-select:hover, .ed-input:hover { border-color: var(--muted); }
    .ed-select:focus, .ed-input:focus { border-color: var(--accent); }
    .ed-input[type=number] { width: 52px; text-align: center; cursor: text; }
    .ed-input[type=range]  { width: 72px; accent-color: var(--accent2); cursor: pointer; padding: 0; border: none; background: none; }

    .ed-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      color: var(--muted);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 3px 10px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .ed-btn:hover { color: var(--text); border-color: var(--muted); }
    .ed-btn.primary { color: var(--accent); border-color: rgba(200,168,75,0.4); }
    .ed-btn.primary:hover { background: rgba(200,168,75,0.1); border-color: var(--accent); }
    .ed-btn.danger  { color: #c84b4b; border-color: rgba(200,75,75,0.4); }
    .ed-btn.danger:hover  { background: rgba(200,75,75,0.1); }
    .ed-btn.stop    { color: #c8604b; border-color: rgba(200,96,75,0.4); }
    .ed-btn.stop:hover    { background: rgba(200,96,75,0.1); }
    .ed-btn.active  { color: #5ca85c; border-color: rgba(92,168,92,0.4); background: rgba(92,168,92,0.07); }
    .ed-btn:disabled { opacity: 0.35; cursor: default; }

    .ed-sep { width: 1px; height: 20px; background: var(--border); }

    /* ── track list ── */
    .ed-tracks {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }

    .ed-track {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      border-radius: 3px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      user-select: none;
    }
    .ed-track:hover { background: rgba(255,255,255,0.02); }
    .ed-track.active { border-color: rgba(200,168,75,0.25); background: rgba(200,168,75,0.04); }

    .ed-track-swatch {
      width: 10px; height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .ed-track-name {
      font-size: 0.6rem;
      color: var(--text);
      min-width: 60px;
    }

    .ed-track-sf-sel, .ed-track-inst-sel {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.55rem;
      color: var(--text);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2px 5px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }
    .ed-track-sf-sel:focus, .ed-track-inst-sel:focus { border-color: var(--accent); }
    .ed-track-inst-sel { flex: 1; min-width: 0; max-width: 180px; }

    .ed-track-mute, .ed-track-solo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.5rem;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1px 5px;
      cursor: pointer;
      transition: all 0.12s;
      letter-spacing: 0.04em;
    }
    .ed-track-mute:hover, .ed-track-solo:hover { border-color: var(--muted); color: var(--text); }
    .ed-track-mute.active { color: #c84b4b; border-color: rgba(200,75,75,0.5); background: rgba(200,75,75,0.08); }
    .ed-track-solo.active { color: var(--accent); border-color: rgba(200,168,75,0.5); background: rgba(200,168,75,0.08); }
    .ed-track-del {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.5rem;
      color: var(--muted);
      background: none;
      border: 1px solid transparent;
      border-radius: 2px;
      padding: 1px 5px;
      cursor: pointer;
      transition: all 0.12s;
      margin-left: 2px;
    }
    .ed-track-del:hover { color: #c84b4b; border-color: rgba(200,75,75,0.4); }
    .ed-tracks-add-row {
      display: flex;
      align-items: center;
      padding: 3px 8px;
      gap: 6px;
      cursor: pointer;
      transition: background 0.12s;
      border-radius: 3px;
    }
    .ed-tracks-add-row:hover { background: rgba(255,255,255,0.03); }
    .ed-tracks-add-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1px 7px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .ed-tracks-add-btn:hover { color: var(--text); border-color: var(--muted); }

    /* ── editor main area (keys + roll) ── */
    .ed-main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .ed-keys {
      width: 48px;
      flex-shrink: 0;
      overflow: hidden;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .ed-roll-wrap {
      flex: 1;
      overflow: auto;
      position: relative;
    }

    .ed-roll-inner {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      position: relative;
    }

    .ed-row {
      display: flex;
      height: 14px;
      flex-shrink: 0;
      position: relative;
    }

    .ed-cell {
      width: 40px;
      height: 14px;
      flex-shrink: 0;
      border-right: 1px solid rgba(20,30,40,0.6);
      border-bottom: 1px solid rgba(20,30,40,0.4);
      position: relative;
      cursor: pointer;
      transition: background 0.06s;
      user-select: none;
    }

    .ed-row.is-black .ed-cell { background: rgba(0,0,0,0.12); }
    .ed-cell.bar-start  { border-left: 2px solid rgba(75,139,200,0.18); }
    .ed-cell.beat-start { border-left: 1px solid rgba(75,139,200,0.1); }

    .ed-cell:hover { background: rgba(200,168,75,0.12) !important; }
    .ed-cell.ed-on { box-shadow: 0 0 3px rgba(0,0,0,0.3); }
    .ed-cell.ed-on::after {
      content: '';
      position: absolute;
      top: 1px; left: 1px; right: 1px;
      height: 3px;
      background: rgba(255,255,255,0.22);
      border-radius: 1px;
    }
    .ed-cell.ed-on[data-layer="0"] { background: rgba(200,168,75,0.82) !important; }
    .ed-cell.ed-on[data-layer="1"] { background: rgba(75,139,200,0.82) !important; }
    .ed-cell.ed-on[data-layer="2"] { background: rgba(92,168,122,0.82) !important; }
    .ed-cell.ed-on[data-layer="3"] { background: rgba(200,96,75,0.82)  !important; }

    #ed-sel-box {
      position: absolute;
      border: 1.5px dashed rgba(75,139,200,0.75);
      background: rgba(75,139,200,0.07);
      pointer-events: none;
      display: none;
      z-index: 10;
    }
    .ed-cell.ed-selected::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 2px solid rgba(255,255,255,0.55);
      pointer-events: none;
    }

    /* editor playhead */
    .ed-playhead {
      position: absolute;
      top: 0; bottom: 0;
      width: 2px;
      background: var(--head);
      box-shadow: 0 0 8px rgba(75,139,200,0.7);
      pointer-events: none;
      display: none;
      z-index: 5;
    }

    /* ── editor footer ── */
    .ed-ftr {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 6px 16px;
      border-top: 1px solid var(--border);
      font-size: 0.56rem;
      color: var(--muted);
      flex-shrink: 0;
      background: var(--bg);
    }
    .ed-ftr span { color: var(--text); }

    /* import hidden input */
    #ed-import-file { display: none; }

    /* ═══════════════════════════════════════════════════════════════
       COLLAB TAB
       ═══════════════════════════════════════════════════════════════ */

    .cb-lobby {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cb-lobby-inner {
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }
    .cb-lobby-title {

function resolveInstrumentName(sf, program, bank = 0) {
  const tbl = INST_NAMES[sf];
  if (!tbl) return `prog ${program}`;
  return tbl[`${bank},${program}`] || `prog ${program}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// SHARED GRID CORE
// Foundation for both the solo editor and collab grids.
// Grid construction and refresh live here. Interaction (drag-select vs WS
// broadcast) is injected by each tab via callbacks so there's no duplication.
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Build piano key strips into `el`.
 * @param {HTMLElement}   el       - container element
 * @param {Function|null} onClick  - (midi) => void, or null for display-only
 */
function buildPianoKeys(el, onClick) {
  el.innerHTML = '';
  NOTES.forEach(midi => {
    const key = document.createElement('div');
    key.className = `key ${isBlack(midi) ? 'black' : 'white'}${midi % 12 === 0 ? ' c' : ''}`;
    key.textContent = midi % 12 === 0 ? noteName(midi) : '';
    key.title = noteName(midi);
    key.dataset.midi = midi;
    if (onClick) key.addEventListener('click', () => onClick(midi));
    el.appendChild(key);
  });
}

/**
 * Build note grid rows + cells into `innerEl`, populate `cellMap`.
 * @param {HTMLElement} innerEl    - the .ed-roll-inner div
 * @param {number}      steps      - total step count
 * @param {number}      spb        - steps per bar (for bar-start/beat-start CSS)
 * @param {Map}         cellMap    - cleared + repopulated: 'row-step' → cell
 * @param {HTMLElement} playheadEl - grid rows are inserted before this element
 * @param {Function}    onCell     - (cell, midi, step, row) => void — attach listeners here
 */
function buildNoteGrid(innerEl, steps, spb, cellMap, playheadEl, onCell) {
  cellMap.clear();
  innerEl.querySelectorAll('.ed-row').forEach(r => r.remove());
  const frag = document.createDocumentFragment();
  NOTES.forEach((midi, row) => {
    const rowEl = document.createElement('div');
    rowEl.className = `ed-row${isBlack(midi) ? ' is-black' : ''}`;
    for (let s = 0; s < steps; s++) {
      const cell = document.createElement('div');
      const cls  = s % spb === 0 ? 'bar-start' : (s % Math.max(1, Math.round(spb / 2)) === 0 ? 'beat-start' : '');
      cell.className = 'ed-cell' + (cls ? ' ' + cls : '');
      cell.dataset.row  = row;
      cell.dataset.step = s;
      cell.dataset.midi = midi;
      if (onCell) onCell(cell, midi, s, row);
      cellMap.set(`${row}-${s}`, cell);
      rowEl.appendChild(cell);
    }
    frag.appendChild(rowEl);
  });
  innerEl.insertBefore(frag, playheadEl);
}

/**
 * Refresh the visual state of a note grid — clear ed-on, repaint from notes.
 * @param {Array}    notes    - note objects
 * @param {Map}      cellMap  - 'row-step' → cell
 * @param {Function} layerFn  - (note) => number — CSS data-layer value for coloring
 */
function refreshNoteGrid(notes, cellMap, layerFn) {
  cellMap.forEach(cell => { cell.classList.remove('ed-on'); delete cell.dataset.layer; });
  notes.forEach(n => {
    const row = edRowMap.get(n.note);
    if (row == null) return;
    const layer = layerFn ? layerFn(n) : 0;
    for (let d = 0; d < (n.duration || 1); d++) {
      const cell = cellMap.get(`${row}-${n.step + d}`);
      if (cell) { cell.classList.add('ed-on'); cell.dataset.layer = layer; }
    }
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// SHARED AUDIO + WS STATE
// ─────────────────────────────────────────────────────────────────────────────
let audioCtx    = null;
let gainNode    = null;
let volumeLevel = 0.8;
let ws          = null;
let wsReady     = false;

// live tab playback
let livePlaySource  = null;
let livePlayStart   = 0;
let livePlayDur     = 0;
let liveAnimId      = null;
let liveIsPlaying   = false;

// editor tab playback
let edPlaySource  = null;
let edPlayStart   = 0;
let edPlayDur     = 0;
let edAnimId      = null;
let edIsPlaying   = false;
let edPendingRender = false; // waiting for server response
let edLiveUpdateTimer = null; // debounce timer for live note update

let edSelected    = new Set();   // indices into edNotes that are selected
let edSelecting   = false;       // drag-select in progress
let edSelBox      = { r1:0, s1:0, r2:0, s2:0 }; // drag-select box (row/step coords)
let edUndoStack   = [];          // snapshots of edNotes for undo
const ED_UNDO_MAX = 20;
let edCursorStep  = 0;           // step to restart playback from (spacebar)
let edCursorOfs   = 0;           // pending resume offset in seconds for next play
let edMouseDownCell = null;      // { row, step, midi, ctrl } — tracks the cell where mousedown fired
let edDragged     = false;       // true once mouseenter fires on a different cell during drag

function getCtx() {
  if (!audioCtx) {
    audioCtx = new AudioContext();
    gainNode  = audioCtx.createGain();
    gainNode.gain.value = volumeLevel;
    gainNode.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// separate audio context for editor tab (independent mute/volume from live)
let edAudioCtx = null;
let edGainNode = null;
let edVolLevel = 0.8;
let edIsMuted  = false;

function getEdCtx() {
  if (!edAudioCtx) {
    edAudioCtx = new AudioContext();
    edGainNode = edAudioCtx.createGain();
    edGainNode.gain.value = edVolLevel;
    edGainNode.connect(edAudioCtx.destination);
  }
  if (edAudioCtx.state === 'suspended') edAudioCtx.resume();
  return edAudioCtx;
}

function b64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf.buffer;
}

// ─────────────────────────────────────────────────────────────────────────────

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-live-btn').classList.toggle('active', tab === 'live');
  document.getElementById('tab-editor-btn').classList.toggle('active', tab === 'editor');
  document.getElementById('tab-collab-btn').classList.toggle('active', tab === 'collab');
  document.getElementById('panel-live').classList.toggle('active', tab === 'live');
  document.getElementById('panel-editor').classList.toggle('active', tab === 'editor');
  document.getElementById('panel-collab').classList.toggle('active', tab === 'collab');
  // auto-mute live audio when leaving the live tab
  if (tab === 'editor' && !isMuted) toggleMute();
  if (tab === 'live'   &&  isMuted) toggleMute();
  // build collab grid if switching to it and in a room
  if (tab === 'collab' && cbInRoom) buildCbGrid(cbSteps);
}

// ─────────────────────────────────────────────────────────────────────────────
// LIVE TAB
// ─────────────────────────────────────────────────────────────────────────────
let currentNoteKeys = new Set();
let currentState    = null;
let cellMap         = new Map();
let rowMap          = new Map();
let stepsBuilt      = 0;

NOTES.forEach((n, i) => rowMap.set(n, i));

function buildKeys() {
  const keysEl = document.getElementById('keys');
  keysEl.innerHTML = '';
  NOTES.forEach(midi => {
    const black = isBlack(midi);
    const isC   = (midi % 12) === 0;
    const key   = document.createElement('div');
    key.className = `key ${black ? 'black' : 'white'}${isC ? ' c' : ''}`;
    key.textContent = isC ? noteName(midi) : '';
    key.title = noteName(midi);
    key.dataset.midi = midi;
    key.addEventListener('click', () => previewNote(midi));
    keysEl.appendChild(key);
  });
}

function buildGrid(steps) {
  if (steps === stepsBuilt && cellMap.size > 0) return;
  stepsBuilt = steps;
  cellMap.clear();

  const inner = document.getElementById('grid-inner');
  inner.querySelectorAll('.grid-row').forEach(r => r.remove());

  const frag = document.createDocumentFragment();
  NOTES.forEach((midi, row) => {
    const rowEl = document.createElement('div');
    rowEl.className = `grid-row${isBlack(midi) ? ' is-black' : ''}`;
    rowEl.dataset.row = row;

    for (let s = 0; s < steps; s++) {
      const cell = document.createElement('div');
      const cls  = s % 4 === 0 ? 'bar-start' : (s % 2 === 0 ? 'beat-start' : '');
      cell.className = 'cell' + (cls ? ' ' + cls : '');
      cell.dataset.row  = row;
      cell.dataset.step = s;
      cell.dataset.midi = midi;
      cell.addEventListener('click', () => {
        if (currentState && currentState.notes.length) previewNote(midi);
      });
      cellMap.set(`${row}-${s}`, cell);
      rowEl.appendChild(cell);
    }
    frag.appendChild(rowEl);
  });

  const overlay = document.getElementById('idle-overlay');
  inner.insertBefore(frag, overlay);
}

function updateLegend(layers) {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  layers.forEach((info, lid) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-swatch" style="background:${info.color}"></div>${info.instrument || ('layer ' + lid)}`;
    el.appendChild(item);
  });
}

const cellMeta = new Map();
const tipEl   = document.getElementById('note-tip');
const tipNote = document.getElementById('tip-note');
const tipInst = document.getElementById('tip-inst');
document.addEventListener('mousemove', e => {
  if (tipEl.style.display === 'block') {
    tipEl.style.left = (e.clientX + 12) + 'px';
    tipEl.style.top  = (e.clientY - 32) + 'px';
  }
});

function applyState(state, animate = false) {
  currentState = state;
  const steps = state.steps || 16;
  buildGrid(steps);

  const layerInfo = new Map();
  const newKeys   = new Set();
  const newMeta   = new Map();

  (state.notes || []).forEach(n => {
    const row = rowMap.get(n.note);
    if (row == null) return;
    const lid   = n.layer ?? 0;
    const color = LAYER_COLORS[lid % LAYER_COLORS.length];
    const inst  = n._instName || resolveInstrumentName(state.sf, n.program, n.bank);
    if (!layerInfo.has(lid)) layerInfo.set(lid, {instrument: inst, color});
    for (let d = 0; d < (n.duration || 1); d++) {
      const key = `${row}-${n.step + d}`;
      newKeys.add(key);
      newMeta.set(key, {layer: lid, midi: n.note, instrument: inst});
    }
  });

  const added   = [...newKeys].filter(k => !currentNoteKeys.has(k));
  const removed = [...currentNoteKeys].filter(k => !newKeys.has(k));

  removed.forEach(k => {
    const cell = cellMap.get(k);
    if (cell) {
      cell.classList.remove('on', 'flash');
      cell.removeAttribute('data-layer');
      cell.onmouseenter = null;
      cell.onmouseleave = null;
    }
    cellMeta.delete(k);
  });

  added.forEach(k => {
    const cell = cellMap.get(k);
    if (!cell) return;
    const meta = newMeta.get(k);
    cell.classList.add('on');
    cell.dataset.layer = meta.layer;
    cellMeta.set(k, meta);
    cell.onmouseenter = () => {
      tipNote.textContent = noteName(meta.midi);
      tipInst.textContent = ' · ' + meta.instrument;
      tipEl.style.display = 'block';
    };
    cell.onmouseleave = () => { tipEl.style.display = 'none'; };
    if (animate) {
      cell.classList.remove('flash');
      void cell.offsetWidth;
      cell.classList.add('flash');
      setTimeout(() => cell.classList.remove('flash'), 600);
    }
  });

  newKeys.forEach(k => {
    const cell = cellMap.get(k);
    const meta = newMeta.get(k);
    if (cell && meta) cell.dataset.layer = meta.layer;
  });

  currentNoteKeys = newKeys;

  document.getElementById('hdr-sf').textContent   = state.sf || '—';
  document.getElementById('hdr-inst').textContent  = state.instrument || '—';
  const bpmEl = document.getElementById('hdr-bpm');
  if (state.bpm) {
    bpmEl.style.display = '';
    document.getElementById('bpm-val').textContent = state.bpm;
  }
  document.getElementById('hdr-label').textContent = state.label || '';
  document.getElementById('note-count').textContent = (state.notes || []).length;

  if (state.bpm && state.steps && state.step_beats) {
    const beats = state.steps * state.step_beats;
    const secs  = (beats * 60 / state.bpm).toFixed(1);
    document.getElementById('ftr-loop').textContent = `loop: ${beats} beats · ${secs}s`;
  }

  const overlay = document.getElementById('idle-overlay');
  if ((state.notes || []).length > 0) {
    overlay.classList.add('hidden');
  } else {
    overlay.classList.remove('hidden');
  }

  const layers = [];
  layerInfo.forEach((info, lid) => { layers[lid] = info; });
  updateLegend(layers.filter(Boolean));
}

function setStatus(status, label) {
  const el = document.getElementById('hdr-status');
  el.className = `hdr-status ${status}`;
  const map = { idle: 'idle', composing: 'composing…', rendering: 'rendering…', playing: 'playing ↺' };
  el.textContent = map[status] || status;
  if (label) document.getElementById('hdr-label').textContent = label;
}

function liveStopPlayback() {
  if (livePlaySource) { try { livePlaySource.stop(); } catch(e) {} livePlaySource = null; }
  liveIsPlaying = false;
  if (liveAnimId) { cancelAnimationFrame(liveAnimId); liveAnimId = null; }
  document.getElementById('playhead').style.display = 'none';
}

async function livePlayAudio(b64, bpm, steps, stepBeats) {
  liveStopPlayback();
  const ctx = getCtx();
  let audioBuf;
  try { audioBuf = await ctx.decodeAudioData(b64ToArrayBuffer(b64)); }
  catch(e) { console.error('decode error', e); return; }

  const exactDuration = steps * stepBeats * (60 / bpm);
  livePlayDur = exactDuration;

  const src = ctx.createBufferSource();
  src.buffer    = audioBuf;
  src.loop      = true;
  src.loopStart = 0;
  src.loopEnd   = exactDuration;
  src.connect(gainNode || ctx.destination);
  src.start();
  livePlaySource = src;
  liveIsPlaying  = true;
  livePlayStart  = ctx.currentTime;

  setStatus('playing');
  liveAnimatePlayhead(steps, stepBeats, bpm);
}

function liveAnimatePlayhead(steps, stepBeats, bpm) {
  const ph        = document.getElementById('playhead');
  const totalSec  = steps * stepBeats * (60 / bpm);
  ph.style.display = 'block';

  function frame() {
    if (!liveIsPlaying) return;
    const ctx     = getCtx();
    const elapsed = (ctx.currentTime - livePlayStart) % totalSec;
    ph.style.left = (elapsed / totalSec * steps * 40) + 'px';
    liveAnimId = requestAnimationFrame(frame);
  }
  frame();
}

function previewNote(midi) {
  if (!wsReady) return;
  const prog = currentState?.notes?.[0]?.program ?? 0;
  const bank = currentState?.notes?.[0]?.bank ?? 0;
  ws.send(JSON.stringify({ type: 'preview', note: midi, velocity: 72, duration: 0.8, program: prog, bank }));
}

// editor state
const ED_TRACKS = [
  { name: 'lead',  sf: 'pokemon', bank: 0,   program: 80, mute: false, solo: false },
  { name: 'bass',  sf: 'pokemon', bank: 0,   program: 33, mute: false, solo: false },
  { name: 'drums', sf: 'pokemon', bank: 128, program: 0,  mute: false, solo: false },
];
let edActiveTrack = 0;

// notes: { note(midi), step, velocity, duration, track }
let edNotes = [];

let edCellMap  = new Map(); // `${row}-${step}` → cell DOM
let edRowMap   = new Map(); // midi → row index
let edBuilt    = 0;

NOTES.forEach((n, i) => edRowMap.set(n, i));

// ── instrument selector helpers ───────────────────────────────────────────────
function buildInstOptions(sfKey, bankNum) {
  const sf    = INST_DATA[sfKey];
  if (!sf) return '';
  const presets = sf.banks[bankNum] || sf.banks[0] || [];
  return presets.map(([p, name]) => `<option value="${p}">${name}</option>`).join('');
}

function buildBankOptions(sfKey) {
  const sf = INST_DATA[sfKey];
  if (!sf) return '<option value="0">0</option>';
  return Object.keys(sf.banks).map(b => `<option value="${b}">bank ${b}</option>`).join('');
}

// ── build track controls ──────────────────────────────────────────────────────
function buildTrackUI() {
  const container = document.getElementById('ed-tracks');
  container.innerHTML = '';

  ED_TRACKS.forEach((track, idx) => {
    const el = document.createElement('div');
    el.className = 'ed-track' + (idx === edActiveTrack ? ' active' : '');
    el.id = `ed-track-row-${idx}`;

    const color = LAYER_COLORS[idx % LAYER_COLORS.length];
    const instOpts = buildInstOptions(track.sf, track.bank);

    el.innerHTML = `
      <div class="ed-track-swatch" style="background:${color}"></div>
      <div class="ed-track-name">${track.name}</div>
      <select class="ed-track-sf-sel" id="ed-sf-${idx}" onchange="onTrackSfChange(${idx})">
        <option value="pokemon"${track.sf==='pokemon'?' selected':''}>Pokemon</option>
        <option value="megadrive"${track.sf==='megadrive'?' selected':''}>Megadrive</option>
      </select>
      <select class="ed-track-sf-sel" id="ed-bank-${idx}" onchange="onTrackBankChange(${idx})">
        ${buildBankOptions(track.sf)}
      </select>
      <select class="ed-track-inst-sel" id="ed-inst-${idx}" onchange="onTrackInstChange(${idx})">
        ${instOpts}
      </select>
      <button class="ed-track-mute${track.mute?' active':''}" onclick="toggleMute(${idx},event)">M</button>
      <button class="ed-track-solo${track.solo?' active':''}" onclick="toggleSolo(${idx},event)">S</button>
      <button class="ed-track-del" onclick="removeTrack(${idx},event)" title="remove track">×</button>
    `;

    el.addEventListener('click', e => {
      if (e.target.tagName === 'SELECT' || e.target.tagName === 'BUTTON') return;
      setActiveTrack(idx);
    });

    // set correct bank selection
    const bankSel = el.querySelector(`#ed-bank-${idx}`);
    bankSel.value = track.bank;

    // set correct instrument selection
    const instSel = el.querySelector(`#ed-inst-${idx}`);
    instSel.value = track.program;

    container.appendChild(el);
  });

  // add-track row
  const addRow = document.createElement('div');
  addRow.className = 'ed-tracks-add-row';
  addRow.innerHTML = `<button class="ed-tracks-add-btn" onclick="addTrack()">+ add track</button>`;
  container.appendChild(addRow);
}

function addTrack() {
  ED_TRACKS.push({ name: `track ${ED_TRACKS.length + 1}`, sf: 'pokemon', bank: 0, program: 80, mute: false, solo: false });
  buildTrackUI();
  setActiveTrack(ED_TRACKS.length - 1);
}

function removeTrack(idx, e) {
  e.stopPropagation();
  if (ED_TRACKS.length <= 1) return;
  ED_TRACKS.splice(idx, 1);
  edNotes = edNotes
    .filter(n => n.track !== idx)
    .map(n => ({ ...n, track: n.track > idx ? n.track - 1 : n.track }));
  if (edActiveTrack >= ED_TRACKS.length) edActiveTrack = ED_TRACKS.length - 1;
  buildTrackUI();
  setActiveTrack(edActiveTrack);
  edRefreshGrid();
  edUpdateFooter();
}

function setActiveTrack(idx) {
  edActiveTrack = idx;
  document.querySelectorAll('.ed-track').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

function onTrackSfChange(idx) {
  const sf = document.getElementById(`ed-sf-${idx}`).value;
  ED_TRACKS[idx].sf = sf;
  ED_TRACKS[idx].bank = 0;

  const bankSel = document.getElementById(`ed-bank-${idx}`);
  bankSel.innerHTML = buildBankOptions(sf);
  bankSel.value = 0;

  const instSel = document.getElementById(`ed-inst-${idx}`);
  instSel.innerHTML = buildInstOptions(sf, 0);
  const firstProg = INST_DATA[sf]?.banks[0]?.[0]?.[0] ?? 0;
  instSel.value = firstProg;
  ED_TRACKS[idx].program = parseInt(firstProg);
}

function onTrackBankChange(idx) {
  const bank = parseInt(document.getElementById(`ed-bank-${idx}`).value);
  ED_TRACKS[idx].bank = bank;
  const sf = ED_TRACKS[idx].sf;
  const instSel = document.getElementById(`ed-inst-${idx}`);
  instSel.innerHTML = buildInstOptions(sf, bank);
  const firstProg = INST_DATA[sf]?.banks[bank]?.[0]?.[0] ?? 0;
  instSel.value = firstProg;
  ED_TRACKS[idx].program = parseInt(firstProg);
}

function onTrackInstChange(idx) {
  ED_TRACKS[idx].program = parseInt(document.getElementById(`ed-inst-${idx}`).value);
}

function toggleMute(idx, e) {
  e.stopPropagation();
  ED_TRACKS[idx].mute = !ED_TRACKS[idx].mute;
  e.target.classList.toggle('active', ED_TRACKS[idx].mute);
}

function toggleSolo(idx, e) {
  e.stopPropagation();
  ED_TRACKS[idx].solo = !ED_TRACKS[idx].solo;
  e.target.classList.toggle('active', ED_TRACKS[idx].solo);
}

// ── build editor piano keys ───────────────────────────────────────────────────
function buildEdKeys() {
  buildPianoKeys(document.getElementById('ed-keys'), edPreviewNote);
}

// ── build editor grid ─────────────────────────────────────────────────────────
function buildEdGrid(steps) {
  if (steps === edBuilt && edCellMap.size > 0) return;
  edBuilt = steps;
  buildNoteGrid(
    document.getElementById('ed-roll-inner'),
    steps,
    edGetStepsPerBar(),
    edCellMap,
    document.getElementById('ed-playhead'),
    (cell, midi, s, row) => {
      cell.addEventListener('mousedown', e => {
        e.preventDefault();
        edMouseDownCell = { row, step: s, midi, ctrl: e.ctrlKey || e.metaKey };
        edDragged = false;
      });
      cell.addEventListener('mouseenter', e => {
        if (e.buttons !== 1 || !edMouseDownCell) return;
        if (!edDragged) {
          edDragged = true;
          edSelecting = true;
          if (!edMouseDownCell.ctrl) edClearSelection();
          edSelBox = { r1: edMouseDownCell.row, s1: edMouseDownCell.step, r2: row, s2: s };
        } else if (edSelecting) {
          edSelBox.r2 = row; edSelBox.s2 = s;
        }
        edUpdateSelBox();
      });
    }
  );
  edRefreshGrid();
}

// ── click handler ─────────────────────────────────────────────────────────────
function edCellClick(midi, step, row, cell) {
  edPushUndo();
  const steps   = edGetSteps();
  const notelen = parseInt(document.getElementById('ed-notelen').value);
  const vel     = parseInt(document.getElementById('ed-vel').value);
  const tid     = edActiveTrack;

  // check if ANY note (any track) exists at this cell — clicking filled cell always removes
  const existing = edNotes.find(n => n.note === midi &&
    step >= n.step && step < n.step + n.duration);

  if (existing) {
    // remove it (regardless of which track it's on)
    edNotes = edNotes.filter(n => n !== existing);
  } else {
    // clamp duration so it doesn't overflow
    const dur = Math.min(notelen, steps - step);
    edNotes.push({ note: midi, step, velocity: vel, duration: dur, track: tid });
    edPreviewNote(midi);
  }

  edRefreshGrid();
  edUpdateFooter();
  edScheduleLiveUpdate();
}

// ── live playback update ──────────────────────────────────────────────────────
function edScheduleLiveUpdate() {
  if (!edIsPlaying) return;
  if (edLiveUpdateTimer) clearTimeout(edLiveUpdateTimer);
  edLiveUpdateTimer = setTimeout(() => {
    edLiveUpdateTimer = null;
    if (!edIsPlaying || edPendingRender) return;
    edPlay();
  }, 350);
}

// ── refresh grid display ──────────────────────────────────────────────────────
function edRefreshGrid() {
  refreshNoteGrid(edNotes, edCellMap, n => n.track ?? 0);
  // selection highlight is editor-only — apply after base refresh
  edCellMap.forEach(cell => cell.classList.remove('ed-selected'));
  edSelected.forEach(idx => {
    const n = edNotes[idx];
    if (!n) return;
    const row = edRowMap.get(n.note);
    if (row == null) return;
    for (let d = 0; d < (n.duration || 1); d++) {
      const cell = edCellMap.get(`${row}-${n.step + d}`);
      if (cell) cell.classList.add('ed-selected');
    }
  });
}

// ── selection helpers ─────────────────────────────────────────────────────────
function edPushUndo() {
  edUndoStack.push(edNotes.map(n => ({...n})));
  if (edUndoStack.length > ED_UNDO_MAX) edUndoStack.shift();
}

function edUndo() {
  if (!edUndoStack.length) return;
  edNotes = edUndoStack.pop();
  edSelected.clear();
  edRefreshGrid();
  edUpdateFooter();
  edScheduleLiveUpdate();
}

function edClearSelection() {
  edSelected.clear();
  edRefreshGrid();
}

function edSelectAll() {
  edSelected = new Set(edNotes.map((_, i) => i));
  edRefreshGrid();
}

function edDeleteSelected() {
  if (!edSelected.size) return;
  edPushUndo();
  edNotes = edNotes.filter((_, i) => !edSelected.has(i));
  edSelected.clear();
  edRefreshGrid();
  edUpdateFooter();
  edScheduleLiveUpdate();
}

function edDuplicateSelected() {
  if (!edSelected.size) return;
  const sel = [...edSelected].map(i => edNotes[i]);
  if (!sel.length) return;
  const minStep = Math.min(...sel.map(n => n.step));
  const maxEnd  = Math.max(...sel.map(n => n.step + (n.duration || 1)));
  const span    = maxEnd - minStep;
  const totalSteps = edGetSteps();
  edPushUndo();
  const newNotes = sel
    .map(n => ({ ...n, step: n.step + span }))
    .filter(n => n.step < totalSteps);
  const offset = edNotes.length;
  edNotes = [...edNotes, ...newNotes];
  edSelected = new Set(newNotes.map((_, i) => offset + i));
  edRefreshGrid();
  edUpdateFooter();
  edScheduleLiveUpdate();
}

// drag-select box
function edUpdateSelBox() {
  const el = document.getElementById('ed-sel-box');
  if (!el) return;
  const r1 = Math.min(edSelBox.r1, edSelBox.r2);
  const r2 = Math.max(edSelBox.r1, edSelBox.r2);
  const s1 = Math.min(edSelBox.s1, edSelBox.s2);
  const s2 = Math.max(edSelBox.s1, edSelBox.s2);
  el.style.display = 'block';
  el.style.left    = (s1 * 40) + 'px';
  el.style.top     = (r1 * 14) + 'px';
  el.style.width   = ((s2 - s1 + 1) * 40) + 'px';
  el.style.height  = ((r2 - r1 + 1) * 14) + 'px';
}

function edFinalizeSelBox() {
  const r1 = Math.min(edSelBox.r1, edSelBox.r2);
  const r2 = Math.max(edSelBox.r1, edSelBox.r2);
  const s1 = Math.min(edSelBox.s1, edSelBox.s2);
  const s2 = Math.max(edSelBox.s1, edSelBox.s2);
  edSelected.clear();
  edNotes.forEach((n, i) => {
    const row = edRowMap.get(n.note);
    if (row == null || row < r1 || row > r2) return;
    // note overlaps the step range
    const nEnd = n.step + (n.duration || 1) - 1;
    if (nEnd >= s1 && n.step <= s2) edSelected.add(i);
  });
  document.getElementById('ed-sel-box').style.display = 'none';
  edRefreshGrid();
}

// ── bars / steps ──────────────────────────────────────────────────────────────
let edBarCount = 4;

function edGetStepBeats() {
  return parseFloat(document.getElementById('ed-stepsize').value) || 0.5;
}

function edGetStepsPerBar(stepB) {
  return Math.round(4 / (stepB || edGetStepBeats()));
}

function edGetSteps() {
  return edBarCount * edGetStepsPerBar();
}

function edAddBars(delta) {
  edBarCount = Math.max(1, edBarCount + delta);
  document.getElementById('ed-bars-display').textContent = edBarCount;
  const newSteps = edGetSteps();
  // clip notes that now fall outside the grid
  if (delta < 0) {
    edNotes = edNotes.filter(n => n.step < newSteps);
  }
  edBuilt = 0;
  buildEdGrid(newSteps);
  edRefreshGrid();
  edUpdateFooter();
}

// rebuild when step size changes (bar count stays, step count changes)
document.getElementById('ed-stepsize').addEventListener('change', () => {
  edBuilt = 0;
  buildEdGrid(edGetSteps());
  edUpdateFooter();
});

document.addEventListener('mouseup', () => {
  if (edSelecting) {
    edFinalizeSelBox();
    edSelecting = false;
  } else if (edMouseDownCell && !edDragged) {
    // plain click (no drag) — toggle note
    const { row, step, midi: m, ctrl } = edMouseDownCell;
    if (!ctrl) edClearSelection();
    const c = edCellMap.get(`${row}-${step}`);
    if (c) edCellClick(m, step, row, c);
  }
  edMouseDownCell = null;
  edDragged = false;
});

document.addEventListener('keydown', e => {
  if (!document.getElementById('panel-editor').classList.contains('active')) return;
  const tag = document.activeElement?.tagName;
  const inInput = tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA';

  if (e.code === 'Space' && !inInput) {
    e.preventDefault();
    if (edIsPlaying) {
      // stop and save cursor at nearest bar-1 downbeat
      const spb   = edGetStepsPerBar();
      const total = edGetSteps();
      const elapsed = (getEdCtx().currentTime - edPlayStart) % edPlayDur;
      const stepF  = (elapsed / edPlayDur) * total;
      edCursorStep = Math.floor(stepF / spb) * spb;
      edStop();
    } else {
      const stepB = edGetStepBeats();
      const bpm   = parseFloat(document.getElementById('ed-bpm').value) || 120;
      edCursorOfs = edCursorStep * stepB * (60 / bpm);
      edPlay();
    }
    return;
  }

  if (e.key === 'Escape') { edClearSelection(); return; }

  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (!inInput && edSelected.size > 0) {
      e.preventDefault();
      edDeleteSelected();
    }
    return;
  }

  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'a') { e.preventDefault(); edSelectAll(); }
    if (e.key === 'd') { e.preventDefault(); edDuplicateSelected(); }
    if (e.key === 'z') { e.preventDefault(); edUndo(); }
  }
});

  ws.send(JSON.stringify({
    type: 'preview',
    note: midi,
    velocity: parseInt(document.getElementById('ed-vel').value),

// ── play ──────────────────────────────────────────────────────────────────────
function edPlay() {
  if (!wsReady) { edSetStatus('not connected'); return; }
  if (edPendingRender) return;

  const bpm      = parseFloat(document.getElementById('ed-bpm').value) || 120;
  const steps    = edGetSteps();
  const stepB    = edGetStepBeats();

  // determine which tracks are active (solo logic)
  const anySolo = ED_TRACKS.some(t => t.solo);
  const activeTracks = new Set(ED_TRACKS.map((t, i) => i)
    .filter(i => !ED_TRACKS[i].mute && (!anySolo || ED_TRACKS[i].solo)));

  if (edNotes.length === 0) { edSetStatus('no notes'); return; }

  const sfCounts = {};
  activeTracks.forEach(i => {
    sfCounts[ED_TRACKS[i].sf] = (sfCounts[ED_TRACKS[i].sf] || 0) + 1;
  });
  // pick dominant sf (most tracks)
  const sf = Object.entries(sfCounts).sort((a,b) => b[1]-a[1])[0]?.[0] || 'pokemon';

  const notes = edNotes
    .filter(n => activeTracks.has(n.track))
    .map(n => {
      const t = ED_TRACKS[n.track];
      return {
        note: n.note,
        step: n.step,
        velocity: n.velocity,
        duration: n.duration,
        program: t.program,
        bank: t.bank,
        layer: n.track,
      };
    });

  edPendingRender = true;
  edSetStatus('rendering…');
  document.getElementById('ed-play-btn').disabled = true;

  ws.send(JSON.stringify({
    type: 'render',
    sf,
    sequence: { bpm, steps, step_beats: stepB, notes }
  }));
}

  edIsPlaying = false;
  if (edAnimId) { cancelAnimationFrame(edAnimId); edAnimId = null; }
  document.getElementById('ed-playhead').style.display = 'none';
  document.getElementById('ed-play-btn').disabled = false;
  document.getElementById('ed-stop-btn').disabled = true;

}

// ── handle incoming audio for editor ─────────────────────────────────────────
async function edReceiveAudio(msg) {
  edPendingRender = false;
  document.getElementById('ed-play-btn').disabled = false;

  const { bpm, steps, step_beats, data } = msg;
  const exactDur = steps * step_beats * (60 / bpm);

  // if we were playing, save position so we can resume from the same spot
  let resumeOffset = 0;
  if (edIsPlaying && edPlayDur > 0) {
    const ctx0 = getEdCtx();
    resumeOffset = (ctx0.currentTime - edPlayStart) % edPlayDur;
    resumeOffset = Math.min(resumeOffset, exactDur - 0.01);
  } else if (edCursorOfs > 0) {
    resumeOffset = Math.min(edCursorOfs, exactDur - 0.01);
    edCursorOfs = 0;
  }

  edStop();
  const ctx = getEdCtx();
  let audioBuf;
  try { audioBuf = await ctx.decodeAudioData(b64ToArrayBuffer(data)); }
  catch(e) { console.error('editor decode error', e); edSetStatus('decode error'); return; }

  edPlayDur = exactDur;

  const src = ctx.createBufferSource();
  src.buffer    = audioBuf;
  src.loop      = true;
  src.loopStart = 0;
  src.loopEnd   = exactDur;
  src.connect(edGainNode || ctx.destination);
  src.start(0, resumeOffset);
  edPlaySource  = src;
  edIsPlaying   = true;
  edPlayStart   = ctx.currentTime - resumeOffset;

  document.getElementById('ed-play-btn').classList.add('active');
  document.getElementById('ed-stop-btn').disabled = false;
  edSetStatus('playing ↺');
  edAnimatePlayhead(steps, step_beats, bpm);
}

function edAnimatePlayhead(steps, stepBeats, bpm) {
  const ph       = document.getElementById('ed-playhead');
  const rollWrap = document.getElementById('ed-roll-wrap');
  const totalSec = steps * stepBeats * (60 / bpm);
  ph.style.display = 'block';
  let lastElapsed = -1;

  function frame() {
    if (!edIsPlaying) return;
    const ctx     = getEdCtx();
    const elapsed = (ctx.currentTime - edPlayStart) % totalSec;
    const pxPos   = elapsed / totalSec * steps * 40;
    ph.style.left = pxPos + 'px';

    // autoscroll + snap
    const visW      = rollWrap.clientWidth;
    const gridW     = steps * 40;
    const canScroll = visW > 0 && gridW > visW;
    const loopWrap  = lastElapsed >= 0 && elapsed < lastElapsed - totalSec * 0.5;

    if (loopWrap) {
      rollWrap.scrollLeft = 0;
      // flash playhead on loop restart so snap-back is always visible
      ph.style.opacity = '0.3';
      setTimeout(() => { ph.style.opacity = '1'; }, 80);
    } else if (canScroll && pxPos > rollWrap.scrollLeft + visW - 80) {
      // playhead near right edge: scroll forward to keep it in view
      rollWrap.scrollLeft = pxPos - 60;
    }

    lastElapsed = elapsed;
    edAnimId = requestAnimationFrame(frame);
  }
  frame();
}

// ─────────────────────────────────────────────────────────────────────────────
// MIDI EXPORT (pure JS)
// ─────────────────────────────────────────────────────────────────────────────
function writeMidi(notes, bpm, steps, stepBeats) {
  const BEAT_TICKS = 480;

  function writeVarLen(val) {
    if (val < 0x80) return [val];
    const bytes = [];
    bytes.unshift(val & 0x7f);
    val >>= 7;
    while (val > 0) { bytes.unshift((val & 0x7f) | 0x80); val >>= 7; }
    return bytes;
  }

  function be4(val) {
    return [(val >> 24) & 0xff, (val >> 16) & 0xff, (val >> 8) & 0xff, val & 0xff];
  }

  function be2(val) {
    return [(val >> 8) & 0xff, val & 0xff];
  }

  function makeTrack(events) {
    // events: [{tick, data:[bytes]}] sorted by tick
    events.sort((a,b) => a.tick - b.tick);
    const bytes = [];
    let lastTick = 0;
    for (const ev of events) {
      const delta = ev.tick - lastTick;
      lastTick = ev.tick;
      bytes.push(...writeVarLen(delta));
      bytes.push(...ev.data);
    }
    // end of track
    bytes.push(0x00, 0xff, 0x2f, 0x00);
    return bytes;
  }

  const stepTicks = Math.round(BEAT_TICKS * stepBeats);
  const tempo     = Math.round(60000000 / bpm); // microseconds per beat

  // tempo track
  const tempoTrack = makeTrack([{
    tick: 0,
    data: [0xff, 0x51, 0x03, (tempo>>16)&0xff, (tempo>>8)&0xff, tempo&0xff]
  }]);

  // group notes by track
  const byTrack = new Map();
  notes.forEach(n => {
    if (!byTrack.has(n.track)) byTrack.set(n.track, []);
    byTrack.get(n.track).push(n);
  });

  const midiTracks = [tempoTrack];
  const chMap      = new Map(); // track → channel

  let chIdx = 0;
  byTrack.forEach((tNotes, tid) => {
    const ch = chIdx++;
    chMap.set(tid, ch);
    const track   = ED_TRACKS[tid] || { program: 0, bank: 0 };
    const events  = [];

    // program change
    events.push({ tick: 0, data: [0xC0 | ch, track.program & 0x7f] });
    // bank select (CC 0 + 32)
    if (track.bank > 0) {
      events.push({ tick: 0, data: [0xB0 | ch, 0x00, (track.bank >> 7) & 0x7f] });
      events.push({ tick: 0, data: [0xB0 | ch, 0x20, track.bank & 0x7f] });
    }

    tNotes.forEach(n => {
      const startTick = n.step * stepTicks;
      const endTick   = startTick + n.duration * stepTicks - 1;
      const vel       = n.velocity || 90;
      events.push({ tick: startTick, data: [0x90 | ch, n.note & 0x7f, vel & 0x7f] });
      events.push({ tick: endTick,   data: [0x80 | ch, n.note & 0x7f, 0x00] });
    });

    midiTracks.push(makeTrack(events));
  });

  // assemble header + tracks
  const numTracks = midiTracks.length;
  const header = [
    0x4d, 0x54, 0x68, 0x64, // MThd
    0x00, 0x00, 0x00, 0x06, // length = 6
    0x00, 0x01,             // format 1
    ...be2(numTracks),
    ...be2(BEAT_TICKS),
  ];

  const all = [...header];
  midiTracks.forEach(t => {
    all.push(0x4d, 0x54, 0x72, 0x6b); // MTrk
    all.push(...be4(t.length));
    all.push(...t);
  });

  return new Uint8Array(all).buffer;
}

function edExportMidi() {
  if (edNotes.length === 0) { edSetStatus('nothing to export'); return; }
  const bpm    = parseFloat(document.getElementById('ed-bpm').value) || 120;
  const steps  = edGetSteps();
  const stepB  = edGetStepBeats();

  const buf  = writeMidi(edNotes, bpm, steps, stepB);
  const blob = new Blob([buf], {type: 'audio/midi'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'barn-midi.mid';
  a.click();
  URL.revokeObjectURL(url);
  edSetStatus('exported');
}

// ─────────────────────────────────────────────────────────────────────────────
// MIDI IMPORT (pure JS)
// ─────────────────────────────────────────────────────────────────────────────
function readVarLen(data, pos) {
  let val = 0;
  let bytesRead = 0;
  let b;
  do {
    b = data[pos++];
    val = (val << 7) | (b & 0x7f);
    bytesRead++;
  } while (b & 0x80 && bytesRead < 4);
  return { val, pos };
}

function parseMidi(buffer) {
  const data = new Uint8Array(buffer);
  let pos = 0;

  function read(n) {
    const slice = data.slice(pos, pos + n);
    pos += n;
    return slice;
  }
  function readU32() {
    const b = read(4);
    return (b[0]<<24)|(b[1]<<16)|(b[2]<<8)|b[3];
  }
  function readU16() {
    const b = read(2);
    return (b[0]<<8)|b[1];
  }

  const magic = readU32();
  if (magic !== 0x4d546864) throw new Error('not a MIDI file');
  const hlen = readU32(); pos += hlen - 6;
  const format    = readU16();
  const numTracks = readU16();
  const tpb       = readU16(); // ticks per beat

  const allNoteOns  = []; // {tick, ch, note, vel}
  const allNoteOffs = []; // {tick, ch, note}
  const progMap     = new Map(); // ch → program
  let   tempo       = 500000;   // microseconds per beat

  for (let ti = 0; ti < numTracks; ti++) {
    const tmagic = readU32();
    if (tmagic !== 0x4d54726b) break;
    const tlen     = readU32();
    const trackEnd = pos + tlen;
    let   tick     = 0;
    let   running  = 0;

    while (pos < trackEnd) {
      const { val: delta, pos: p2 } = readVarLen(data, pos);
      pos = p2;
      tick += delta;

      let status = data[pos];
      if (status & 0x80) { running = status; pos++; }
      else { status = running; }

      const type = status & 0xf0;
      const ch   = status & 0x0f;

      if (status === 0xff) {
        // meta
        const mt   = data[pos++];
        const { val: mlen, pos: p3 } = readVarLen(data, pos);
        pos = p3;
        if (mt === 0x51 && mlen === 3) {
          tempo = (data[pos]<<16)|(data[pos+1]<<8)|data[pos+2];
        }
        pos += mlen;
      } else if (status === 0xf0 || status === 0xf7) {
        const { val: slen, pos: p3 } = readVarLen(data, pos);
        pos = p3 + slen;
      } else if (type === 0x90) {
        const note = data[pos++];
        const vel  = data[pos++];
        if (vel > 0) allNoteOns.push({tick, ch, note, vel});
        else         allNoteOffs.push({tick, ch, note});
      } else if (type === 0x80) {
        const note = data[pos++]; pos++; // skip vel
        allNoteOffs.push({tick, ch, note});
      } else if (type === 0xc0) {
        const prog = data[pos++];
        progMap.set(ch, prog);
      } else if (type === 0xa0 || type === 0xb0 || type === 0xe0) {
        pos += 2;
      } else if (type === 0xd0) {
        pos += 1;
      } else {
        pos++; // unknown, skip 1
      }
    }
    pos = trackEnd;
  }

  const bpm       = Math.round(60000000 / tempo);
  const stepBeats = 0.5; // default to 1/8
  const stepTicks = tpb * stepBeats;

  // match note ons to offs
  const notes = [];
  allNoteOns.forEach(on => {
    const off = allNoteOffs.find(o => o.ch === on.ch && o.note === on.note && o.tick >= on.tick);
    const endTick = off ? off.tick : on.tick + stepTicks;
    if (off) allNoteOffs.splice(allNoteOffs.indexOf(off), 1);

    const step     = Math.round(on.tick / stepTicks);
    const duration = Math.max(1, Math.round((endTick - on.tick) / stepTicks));
    notes.push({ note: on.note, step, velocity: on.vel, duration, track: on.ch % 3 });
  });

  return { bpm, stepBeats, notes };
}

function edImportMidi(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const { bpm, stepBeats, notes } = parseMidi(e.target.result);

      // find max step to determine grid size
      const maxStep = notes.reduce((m, n) => Math.max(m, n.step + n.duration), 0);
      let gridSteps = 16;
      if (maxStep > 16) gridSteps = 32;
      if (maxStep > 32) gridSteps = 64;

      // filter to notes in range
      const filtered = notes.filter(n =>
        n.note >= NOTE_BOT && n.note <= NOTE_TOP && n.step < gridSteps
      );

      // update controls
      document.getElementById('ed-bpm').value = Math.min(220, Math.max(60, bpm));
      const closestStepB = [0.25, 0.5, 1.0].reduce((a,b) => Math.abs(b-stepBeats) < Math.abs(a-stepBeats) ? b : a);
      document.getElementById('ed-stepsize').value = closestStepB;

      // compute bar count from imported steps
      const spb = edGetStepsPerBar(closestStepB);
      edBarCount = Math.max(1, Math.ceil(gridSteps / spb));
      document.getElementById('ed-bars-display').textContent = edBarCount;
      const best = edBarCount * spb;

      edNotes  = filtered;
      edBuilt  = 0;
      buildEdGrid(best);
      edUpdateFooter();
      edSetStatus(`imported ${filtered.length} notes`);
    } catch(err) {
      console.error('MIDI import error', err);
      edSetStatus('import failed');
    }
  };
  reader.readAsArrayBuffer(file);
  input.value = '';
}

// ─────────────────────────────────────────────────────────────────────────────
// COLLAB TAB
// ─────────────────────────────────────────────────────────────────────────────
let cbInRoom        = false;
let cbRoomCode      = null;
let cbIsHost        = false;
let cbMyColorIdx    = 0;
let cbMyRole        = null;       // 'lead'|'bass'|'drums'
let cbSelectedRole  = null;       // picked in lobby
let cbRoomUsers     = [];         // [{name,color,color_idx,is_host,role}]
let cbNotes         = [];         // [{note,step,duration,velocity,user_idx}]
let cbCellMap       = new Map();
let cbBuilt         = 0;
let cbBpm           = 120;
let cbSteps         = 32;
let cbStepBeats     = 0.5;
let cbAudioSource   = null;
let cbIsPlaying     = false;

const CB_ROLES      = ['lead', 'bass', 'drums'];
const CB_ROLE_ICONS = { lead: '♪', bass: '♩', drums: '♦' };
const CB_ROLE_COLORS = { lead: '#c8a84b', bass: '#4b8bc8', drums: '#5ca87a' };

function cbSelectRole(role) {
  // if this role shows a known occupant, don't allow selecting it
  const btn = document.getElementById(`cb-role-btn-${role}`);
  if (btn && btn.disabled) return;
  cbSelectedRole = role;
  CB_ROLES.forEach(r => document.getElementById(`cb-role-btn-${r}`)?.classList.toggle('selected', r === role));
}

function cbCodeChanged() {
  const code = document.getElementById('cb-code-input').value.trim();
  if (code.length === 4 && wsReady) {
    ws.send(JSON.stringify({ type: 'collab_room_info', code }));
  } else if (code.length < 4) {
    cbResetRoleBtns({});
  }
}

function cbResetRoleBtns(roleInfo) {
  CB_ROLES.forEach(r => {
    const btn  = document.getElementById(`cb-role-btn-${r}`);
    const user = document.getElementById(`cb-role-user-${r}`);
    if (!btn) return;
    const taken = !!(roleInfo && roleInfo[r]);
    btn.disabled = taken;
    btn.classList.toggle('selected', cbSelectedRole === r && !taken);
    if (user) user.textContent = taken ? roleInfo[r].name : '';
    if (taken && cbSelectedRole === r) cbSelectedRole = null;
  });
}

function cbGetSpb() {
  // steps per bar (4/4 time)
  return Math.round(1 / cbStepBeats) * 2;
}

function buildCbKeys() {
  const el = document.getElementById('cb-keys');
  if (!el || el.children.length) return;
  buildPianoKeys(el, null); // display-only in collab (no local preview)
}

function buildCbGrid(steps) {
  if (steps === cbBuilt && cbCellMap.size > 0) return;
  cbBuilt = steps;
  buildNoteGrid(
    document.getElementById('cb-roll-inner'),
    steps,
    cbGetSpb(),
    cbCellMap,
    document.getElementById('cb-playhead'),
    (cell, midi, s) => cell.addEventListener('click', () => cbCellClick(midi, s))
  );
  cbRefreshGrid();
}

function cbCellClick(midi, step) {
  if (!cbInRoom || !wsReady) return;
  const existing = cbNotes.find(n => n.note === midi && step >= n.step && step < n.step + (n.duration || 1));
  if (existing) {
    ws.send(JSON.stringify({ type: 'collab_note', action: 'remove', note: existing.note, step: existing.step }));
  } else {
    ws.send(JSON.stringify({ type: 'collab_note', action: 'add', note: midi, step, duration: 1, velocity: 90 }));
  }
}

function cbRefreshGrid() {
  refreshNoteGrid(cbNotes, cbCellMap, n => n.user_idx ?? 0);
}

function cbApplyNote(action, note, step, duration, velocity, user_idx) {
  cbNotes = cbNotes.filter(n => !(n.note === note && n.step === step));
  if (action === 'add') cbNotes.push({ note, step, duration: duration || 1, velocity: velocity || 90, user_idx: user_idx || 0 });
  cbRefreshGrid();
  document.getElementById('cb-note-count').textContent = cbNotes.length;
}

function cbUpdateUsers(users) {
  cbRoomUsers = users;
  const el = document.getElementById('cb-users');
  if (el) {
    el.innerHTML = users.map(u =>
      `<span class="cb-user-pill" style="border-color:${u.color};color:${u.color}">${u.is_host ? '★ ' : ''}${CB_ROLE_ICONS[u.role] || ''} ${u.name}</span>`
    ).join('');
  }
  // update role switcher in toolbar
  const sw = document.getElementById('cb-role-switch');
  if (sw) {
    const takenRoles = new Set(users.map(u => u.role));
    sw.innerHTML = CB_ROLES.map(r => {
      const isMine = r === cbMyRole;
      const taken  = takenRoles.has(r) && !isMine;
      return `<button class="cb-role-switch-btn${isMine ? ' mine' : ''}"
        ${taken ? 'disabled' : ''}
        onclick="cbChangeRole('${r}')"
        title="${taken ? users.find(u=>u.role===r)?.name||'taken' : 'switch to '+r}"
      >${CB_ROLE_ICONS[r]} ${r}</button>`;
    }).join('');
  }
}

function cbShowRoom(code) {
  document.getElementById('cb-lobby').style.display = 'none';
  document.getElementById('cb-room').style.display  = 'flex';
  document.getElementById('cb-room-code').textContent = code;
}

function cbCreate() {
  if (!wsReady) { document.getElementById('cb-error').textContent = 'not connected'; return; }
  if (!cbSelectedRole) { document.getElementById('cb-error').textContent = 'pick a role first'; return; }
  const name = document.getElementById('cb-name-input').value.trim() || 'anon';
  document.getElementById('cb-error').textContent = '';
  ws.send(JSON.stringify({ type: 'collab_create', name, role: cbSelectedRole }));
}

function cbJoin() {
  if (!wsReady) { document.getElementById('cb-error').textContent = 'not connected'; return; }
  if (!cbSelectedRole) { document.getElementById('cb-error').textContent = 'pick a role first'; return; }
  const name = document.getElementById('cb-name-input').value.trim() || 'anon';
  const code = document.getElementById('cb-code-input').value.trim();
  if (!code) { document.getElementById('cb-error').textContent = 'enter a room code'; return; }
  document.getElementById('cb-error').textContent = '';
  ws.send(JSON.stringify({ type: 'collab_join', name, code, role: cbSelectedRole }));
}

function cbChangeRole(newRole) {
  if (!wsReady || !cbInRoom || newRole === cbMyRole) return;
  ws.send(JSON.stringify({ type: 'collab_change_role', role: newRole }));
}

function cbLeave() {
  if (!wsReady || !cbInRoom) return;
  ws.send(JSON.stringify({ type: 'collab_leave' }));
  cbInRoom = false;
  cbRoomCode = null;
  cbNotes = [];
  cbCellMap.clear();
  cbBuilt = 0;
  cbStopPlayback();
  document.getElementById('cb-lobby').style.display = '';
  document.getElementById('cb-room').style.display  = 'none';
  document.getElementById('cb-note-count').textContent = '0';
  document.getElementById('cb-status').textContent = '';
}

function cbSendBpm() {
  if (!wsReady || !cbInRoom) return;
  const bpm = parseInt(document.getElementById('cb-bpm').value);
  if (bpm >= 40 && bpm <= 280) ws.send(JSON.stringify({ type: 'collab_bpm', bpm }));
}

function cbPlay() {
  if (!wsReady || !cbInRoom) return;
  document.getElementById('cb-status').textContent = 'rendering…';
  ws.send(JSON.stringify({ type: 'collab_play', action: 'play' }));
}

function cbStop() {
  if (!wsReady || !cbInRoom) return;
  ws.send(JSON.stringify({ type: 'collab_play', action: 'stop' }));
}

function cbStopPlayback() {
  if (cbAudioSource) { try { cbAudioSource.stop(); } catch(e){} cbAudioSource = null; }
  cbIsPlaying = false;
  const ph = document.getElementById('cb-playhead');
  if (ph) ph.style.display = 'none';
  document.getElementById('cb-status').textContent = '';
}

async function cbReceiveAudio(audioB64, bpm, steps, stepBeats) {
  cbStopPlayback();
  const ctx = getCtx();
  try {
    const buf = await ctx.decodeAudioData(b64ToArrayBuffer(audioB64));
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.loop = true;
    src.connect(gainNode || ctx.destination);
    src.start();
    cbAudioSource = src;
    cbIsPlaying = true;
    document.getElementById('cb-status').textContent = 'playing';
    // animate playhead
    const loopSecs  = steps * stepBeats * (60 / bpm);
    const totalPx   = steps * 40;
    const startTime = ctx.currentTime;
    const ph        = document.getElementById('cb-playhead');
    if (ph) {
      ph.style.display = 'block';
      function animCb() {
        if (!cbIsPlaying || !cbAudioSource) { ph.style.display = 'none'; return; }
        const elapsed = (ctx.currentTime - startTime) % loopSecs;
        ph.style.left = (elapsed / loopSecs * totalPx) + 'px';
        requestAnimationFrame(animCb);
      }
      requestAnimationFrame(animCb);
    }
  } catch(e) { console.error('cb audio:', e); document.getElementById('cb-status').textContent = 'audio error'; }
}

function cbClearAll() {
  if (!wsReady || !cbInRoom) return;
  ws.send(JSON.stringify({ type: 'collab_clear' }));
}

// handle collab WS messages (called from ws.onmessage)
async function cbHandleMessage(msg) {
  if (msg.type === 'collab_room_info') {
    cbResetRoleBtns(msg.roles);
    return;
  }
  if (msg.type === 'collab_joined') {
    cbInRoom     = true;
    cbRoomCode   = msg.code;
    cbIsHost     = msg.is_host;
    cbMyColorIdx = msg.your_color_idx;
    cbMyRole     = msg.your_role;
    cbBpm        = msg.state.bpm;
    cbSteps      = msg.state.steps;
    cbStepBeats  = msg.state.step_beats;
    cbNotes      = msg.state.notes || [];
    document.getElementById('cb-bpm').value = cbBpm;
    cbShowRoom(msg.code);
    cbUpdateUsers(msg.users);
    buildCbKeys();
    buildCbGrid(cbSteps);
    cbRefreshGrid();
    document.getElementById('cb-note-count').textContent = cbNotes.length;
    if (activeTab !== 'collab') switchTab('collab');
    return;
  }
  if (msg.type === 'collab_error') {
    document.getElementById('cb-error').textContent = msg.msg;
    return;
  }
  if (!cbInRoom) return;
  if (msg.type === 'collab_user_joined' || msg.type === 'collab_user_left' || msg.type === 'collab_roles_update') {
    if (msg.type === 'collab_roles_update') {
      // update my role if it changed (only on collab_change_role responses)
      const me = msg.users.find(u => u.color_idx === cbMyColorIdx);
      if (me) cbMyRole = me.role;
    }
    cbUpdateUsers(msg.users);
    return;
  }
  if (msg.type === 'collab_note') {
    cbApplyNote(msg.action, msg.note, msg.step, msg.duration, msg.velocity, msg.user_idx);
    return;
  }
  if (msg.type === 'collab_bpm') {
    cbBpm = msg.bpm;
    document.getElementById('cb-bpm').value = cbBpm;
    return;
  }
  if (msg.type === 'collab_play') {
    if (msg.action === 'stop') cbStopPlayback();
    return;
  }
  if (msg.type === 'collab_audio') {
    await cbReceiveAudio(msg.audio, msg.bpm, msg.steps, msg.step_beats);
    return;
  }
  if (msg.type === 'collab_clear') {
    cbNotes = [];
    cbRefreshGrid();
    document.getElementById('cb-note-count').textContent = '0';
    cbStopPlayback();
    return;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// WEBSOCKET
// ─────────────────────────────────────────────────────────────────────────────
function connectWS() {
  const wsEl = document.getElementById('ftr-ws');
  wsEl.textContent = 'connecting…';
  wsEl.style.color = 'var(--muted)';

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const url   = `${proto}://${location.hostname}/toys/app/`;

  try { ws = new WebSocket(url); }
  catch(e) { wsEl.textContent = 'ws error'; setTimeout(connectWS, 4000); return; }

  ws.onopen = () => {
    wsReady = true;
    wsEl.textContent = 'live';
    wsEl.style.color = '#3d5a3d';
    ws.send(JSON.stringify({type: 'ping'}));
  };

  ws.onclose = () => {
    wsReady = false;
    wsEl.textContent = 'reconnecting…';
    wsEl.style.color = 'var(--muted)';
    edPendingRender = false;
    document.getElementById('ed-play-btn').disabled = false;
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    wsEl.textContent = 'ws error';
    wsEl.style.color = '#6a3030';
  };

  ws.onmessage = async e => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'pong') return;

    // collab messages
    if (msg.type.startsWith('collab_')) { await cbHandleMessage(msg); return; }

    if (msg.type === 'full_state') {
      applyState(msg, false);
      setStatus(msg.status || 'idle');
      if (msg.status === 'playing' && msg.audio) {
        await livePlayAudio(msg.audio, msg.bpm, msg.steps, msg.step_beats);
      }
      return;
    }

    if (msg.type === 'state_update') {
      applyState(msg, true);
      setStatus('composing', msg.label);
      return;
    }

    if (msg.type === 'status') {
      setStatus(msg.status, msg.label);
      if (msg.status === 'idle') liveStopPlayback();
      return;
    }

    if (msg.type === 'audio_ready') {
      await livePlayAudio(msg.audio, msg.bpm, msg.steps, msg.step_beats);
      return;
    }

    if (msg.type === 'audio') {
      if (msg.mode === 'preview') {
        const ctx = getCtx();
        try {
          const buf = await ctx.decodeAudioData(b64ToArrayBuffer(msg.data));
          const src = ctx.createBufferSource();
          src.buffer = buf;
          src.connect(gainNode || ctx.destination);
          src.start();
        } catch(e) { console.error(e); }
        return;
      }

      if (msg.mode === 'sequence' && edPendingRender) {
        await edReceiveAudio(msg);
        return;
      }

      // fallback: live tab audio
      if (msg.bpm && msg.steps && msg.step_beats) {
        await livePlayAudio(msg.data, msg.bpm, msg.steps, msg.step_beats);
      }
      return;
    }
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// VOLUME
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('vol').addEventListener('input', e => {
  volumeLevel = parseFloat(e.target.value);
  if (!isMuted && gainNode) gainNode.gain.value = volumeLevel;
});

let isMuted = false;
function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById('mute-btn');
  if (gainNode) gainNode.gain.value = isMuted ? 0 : volumeLevel;
  btn.textContent = isMuted ? '🔇' : '🔊';
  btn.style.color = isMuted ? 'var(--accent)' : 'var(--muted)';
  btn.style.borderColor = isMuted ? 'var(--accent)' : 'var(--border)';
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
buildKeys();
buildGrid(16);
buildEdKeys();
buildTrackUI();
buildEdGrid(edGetSteps());
edUpdateFooter();
connectWS();
</script>
