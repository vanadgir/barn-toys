<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>barn midi</title>
  <link rel="stylesheet" href="midi.css">
</head>
<body>

<div class="hdr">
  <a class="hdr-back" href="/toys/">← toys</a>
  <div class="hdr-sep">·</div>
  <div class="hdr-title">barn <span>midi</span></div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-radio-btn" onclick="switchTab('radio')">radio</button>
  <button class="tab-btn" id="tab-editor-btn" onclick="switchTab('editor')">editor</button>
</div>

<div class="note-tip" id="note-tip">
  <span class="tip-note" id="tip-note"></span>
  <span class="tip-inst" id="tip-inst"></span>
</div>

<!-- ═══ LIVE TAB ═══ -->
<div class="tab-panel" id="panel-live">
  <div class="live-info-bar">
    <div class="hdr-sf" id="hdr-sf">—</div>
    <div class="hdr-sep">·</div>
    <div class="hdr-inst" id="hdr-inst">waiting…</div>
    <div class="hdr-bpm" id="hdr-bpm" style="display:none">· bpm <span id="bpm-val">—</span></div>
    <div class="hdr-label" id="hdr-label"></div>
    <div class="live-spacer"></div>
    <div class="hdr-status idle" id="hdr-status">idle</div>
  </div>
  <div class="legend" id="legend"></div>
  <div class="main">
    <div class="keys" id="keys"></div>
    <div class="grid-wrap" id="grid-wrap">
      <div class="grid-inner" id="grid-inner">
        <div class="idle-overlay" id="idle-overlay">
          <img class="idle-splash" src="splash.png" alt="">
          <div class="idle-text">waiting for barn…</div>
          <div class="idle-sub">the piano roll will fill up when barn is composing</div>
        </div>
        <div class="playhead" id="playhead"></div>
      </div>
    </div>
  </div>
  <div class="ftr">
    <div class="ftr-note-count"><span id="note-count">0</span></div>
    <div id="ftr-loop"></div>
    <div id="ftr-ws" style="color:var(--muted)">connecting…</div>
    <div class="vol-wrap">
      <button id="mute-btn" onclick="toggleMute()" style="background:none;border:1px solid var(--border);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:0.6rem;padding:2px 8px;border-radius:3px;cursor:pointer;transition:color 0.15s,border-color 0.15s">🔊</button>
      <input type="range" id="vol" min="0" max="1" step="0.05" value="0.8">
    </div>
  </div>
</div>

<!-- ═══ EDITOR TAB ═══ -->
<div class="tab-panel" id="panel-editor">
  <div class="editor-panel">

    <!-- toolbar -->
    <div class="ed-toolbar" id="ed-solo-toolbar">
      <div class="ed-group">
        <span class="ed-label">bpm</span>
        <input type="number" id="ed-bpm" class="ed-input" min="60" max="220" value="120">
      </div>
      <div class="ed-group">
        <span class="ed-label">bars</span>
        <button class="ed-btn" onclick="edAddBars(-1)" style="padding:2px 7px">−</button>
        <span id="ed-bars-display" style="font-size:0.65rem;color:var(--text);min-width:20px;text-align:center;display:inline-block">4</span>
        <button class="ed-btn" onclick="edAddBars(1)" style="padding:2px 7px">+</button>
      </div>
      <div class="ed-group">
        <span class="ed-label">step</span>
        <select id="ed-stepsize" class="ed-select">
          <option value="0.25">1/16</option>
          <option value="0.5" selected>1/8</option>
          <option value="1.0">1/4</option>
        </select>
      </div>
      <div class="ed-group">
        <span class="ed-label">sf</span>
        <select id="ed-sf-global" class="ed-select" onchange="onGlobalSfChange()">
          <option value="pokemon">Pokemon</option>
          <option value="megadrive">Megadrive</option>
          <option value="msgs">MSGS</option>
        </select>
      </div>
      <div class="ed-group">
        <span class="ed-label">len</span>
        <select id="ed-notelen" class="ed-select">
          <option value="1" selected>1</option>
          <option value="2">2</option>
          <option value="4">4</option>
          <option value="8">8</option>
        </select>
      </div>
      <div class="ed-group">
        <span class="ed-label">vel</span>
        <input type="range" id="ed-vel" class="ed-input" min="1" max="127" value="90">
        <span id="ed-vel-val" style="font-size:0.55rem;color:var(--text);min-width:24px">90</span>
      </div>
      <div class="ed-sep"></div>
      <button class="ed-btn primary" id="ed-play-btn" onclick="edPlay()">▶ play</button>
      <button class="ed-btn stop" id="ed-stop-btn" onclick="edStop()" disabled>■ stop</button>
      <div class="ed-sep"></div>
      <button class="ed-btn" onclick="edClear(false)">clear track</button>
      <button class="ed-btn danger" onclick="edClear(true)">clear all</button>
      <div class="ed-sep"></div>
      <input type="text" id="ed-project-name" class="ed-input" placeholder="untitled" style="width:110px;font-size:0.6rem" title="project name">
      <button class="ed-btn" onclick="edExportMidi()">export</button>
      <button class="ed-btn" onclick="document.getElementById('ed-import-file').click()">import</button>
      <input type="file" id="ed-import-file" accept=".mid,.midi" onchange="edImportMidi(this)">
      <button class="ed-btn" onclick="edCopyShareLink(this)" title="copy share link">share</button>
      <div class="ed-sep"></div>
      <button class="ed-btn" id="ed-collab-btn" onclick="edStartCollab()">⇄ collab</button>
    </div>

    <!-- room strip: shown inside solo toolbar area when in a collab room -->
    <div class="ed-toolbar" id="ed-room-strip" style="display:none;background:rgba(75,139,200,0.06);border-top:1px solid rgba(75,139,200,0.18)">
      <span class="ed-label">room</span>
      <span class="cb-room-code-label" id="ed-room-code-strip" style="font-weight:600;color:var(--accent)"></span>
      <button class="ed-btn" onclick="edCopyLink()" style="font-size:0.5rem;padding:2px 6px">copy link</button>
      <div class="ed-sep"></div>
      <div class="ed-group">
        <span class="ed-label">role</span>
        <div class="cb-role-switch" id="cb-role-switch-strip"></div>
      </div>
      <div class="ed-sep"></div>
      <div class="cb-users-wrap" id="cb-users-strip"></div>
      <div style="flex:1"></div>
      <button class="ed-btn danger" onclick="edLeaveCollab()">leave room</button>
    </div>

    <!-- collab toolbar (kept for legacy, hidden in collab mode) -->
    <div class="ed-toolbar" id="ed-collab-toolbar" style="display:none">
      <div class="ed-group">
        <span class="ed-label">room</span>
        <span class="cb-room-code-label" id="ed-room-code"></span>
        <button class="ed-btn" onclick="edCopyLink()" style="font-size:0.5rem;padding:2px 6px">copy link</button>
      </div>
      <div class="ed-sep"></div>
      <div class="ed-group">
        <span class="ed-label">bpm</span>
        <input type="number" id="cb-bpm" class="ed-input" min="40" max="280" value="120" onchange="cbSendBpm()">
      </div>
      <button class="ed-btn primary" id="cb-play-btn" onclick="cbPlay()">▶ play</button>
      <button class="ed-btn stop" id="cb-stop-btn" onclick="cbStop()">■ stop</button>
      <label style="display:flex;align-items:center;gap:4px;font-family:'IBM Plex Mono',monospace;font-size:0.55rem;color:var(--muted);cursor:pointer;margin-left:6px;white-space:nowrap">
        <input type="checkbox" id="cb-loop-toggle" checked style="cursor:pointer;accent-color:var(--accent)">
        loop
      </label>
      <div class="ed-sep"></div>
      <button class="ed-btn danger" onclick="cbClearAll()">clear all</button>
      <div class="ed-sep"></div>
      <button class="ed-btn" onclick="cbExportMidi()">export .mid</button>
      <button class="ed-btn" onclick="document.getElementById('cb-import-file').click()">import .mid</button>
      <input type="file" id="cb-import-file" accept=".mid,.midi" onchange="cbImportMidi(this)" style="display:none">
      <div class="ed-sep"></div>
      <div class="ed-group">
        <span class="ed-label">role</span>
        <div class="cb-role-switch" id="cb-role-switch"></div>
      </div>
      <div class="ed-sep"></div>
      <div class="ed-group" id="cb-inst-group">
        <span class="ed-label">sound</span>
        <select class="ed-track-sf-sel" id="cb-inst-sf" onchange="cbInstSfChange()">
          <option value="pokemon">Pokemon</option>
          <option value="megadrive">Megadrive</option>
          <option value="msgs">MSGS</option>
        </select>
        <select class="ed-track-inst-sel" id="cb-inst-prog" onchange="cbInstProgChange()"></select>
      </div>
      <div class="ed-sep"></div>
      <button class="ed-btn" onclick="edLeaveCollab()">leave</button>
      <div class="cb-users-wrap" id="cb-users"></div>
    </div>

    <!-- track list -->
    <div class="ed-tracks" id="ed-tracks"></div>

    <!-- piano roll -->
    <div class="ed-main">
      <div class="ed-keys" id="ed-keys"></div>
      <div class="ed-roll-wrap" id="ed-roll-wrap">
        <div class="ed-roll-inner" id="ed-roll-inner">
          <div id="ed-sel-box"></div>
          <div class="ed-playhead" id="ed-playhead"></div>
        </div>
      </div>
    </div>
    <div id="ed-note-tip"></div>

    <!-- footer -->
    <div class="ed-ftr">
      <div>notes: <span id="ed-note-count">0</span></div>
      <div id="ed-loop-info"></div>
      <div id="ed-status" style="margin-left:auto"></div>
    </div>

  </div>
</div>

<!-- join overlay: shown when URL has ?room=CODE -->
<div id="join-overlay" style="display:none;position:fixed;inset:0;background:rgba(8,12,16,0.92);z-index:50;display:none;align-items:center;justify-content:center">
  <div style="display:flex;flex-direction:column;gap:18px;align-items:center;padding:32px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;min-width:320px">
    <div style="font-size:0.6rem;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase">join room <span id="join-code-display" style="color:var(--accent);font-weight:700;letter-spacing:0.2em"></span></div>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="ed-label">name</span>
      <input id="join-name" class="ed-input" placeholder="your name" style="width:130px;cursor:text" maxlength="20">
    </div>
    <div class="cb-roles" id="join-roles">
      <button class="cb-role-btn" id="join-role-btn-lead" onclick="joinSelectRole('lead')">
        <span class="cb-role-icon">♪</span>
        <span class="cb-role-name">lead</span>
        <span class="cb-role-user" id="join-role-user-lead"></span>
      </button>
      <button class="cb-role-btn" id="join-role-btn-bass" onclick="joinSelectRole('bass')">
        <span class="cb-role-icon">♩</span>
        <span class="cb-role-name">bass</span>
        <span class="cb-role-user" id="join-role-user-bass"></span>
      </button>
      <button class="cb-role-btn" id="join-role-btn-drums" onclick="joinSelectRole('drums')">
        <span class="cb-role-icon">♦</span>
        <span class="cb-role-name">drums</span>
        <span class="cb-role-user" id="join-role-user-drums"></span>
      </button>
    </div>
    <button class="ed-btn primary" onclick="joinConfirm()" style="width:100%">join</button>
    <button class="ed-btn" onclick="joinDismiss()" style="width:100%;margin-top:-8px;color:var(--muted)">go solo instead</button>
    <div class="cb-error" id="join-error"></div>
  </div>
</div>

<!-- create overlay: shown when user clicks ⇄ collab -->
<div id="create-overlay" style="display:none;position:fixed;inset:0;background:rgba(8,12,16,0.92);z-index:50;align-items:center;justify-content:center">
  <div style="display:flex;flex-direction:column;gap:18px;align-items:center;padding:32px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;min-width:320px">
    <div style="font-size:0.6rem;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase">start collab room</div>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="ed-label">name</span>
      <input id="create-name" class="ed-input" placeholder="your name" style="width:130px;cursor:text" maxlength="20">
    </div>
    <div class="cb-roles" id="create-roles">
      <button class="cb-role-btn selected" id="create-role-btn-lead" onclick="createSelectRole('lead')">
        <span class="cb-role-icon">♪</span>
        <span class="cb-role-name">lead</span>
      </button>
      <button class="cb-role-btn" id="create-role-btn-bass" onclick="createSelectRole('bass')">
        <span class="cb-role-icon">♩</span>
        <span class="cb-role-name">bass</span>
      </button>
      <button class="cb-role-btn" id="create-role-btn-drums" onclick="createSelectRole('drums')">
        <span class="cb-role-icon">♦</span>
        <span class="cb-role-name">drums</span>
      </button>
    </div>
    <button class="ed-btn primary" onclick="createConfirm()" style="width:100%">create room</button>
    <button class="ed-btn" onclick="createDismiss()" style="width:100%;margin-top:-8px;color:var(--muted)">cancel</button>
    <div class="cb-error" id="create-error"></div>
  </div>
</div>

<!-- share popup -->
<div id="share-popup" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:18px 20px;display:none;flex-direction:column;gap:10px;min-width:240px;box-shadow:0 4px 24px rgba(0,0,0,0.5)">
  <div style="font-size:0.55rem;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase">share song</div>
  <input id="share-name-input" class="ed-input" placeholder="song name" maxlength="80" style="width:100%;cursor:text" onkeydown="if(event.key==='Enter')shareConfirm();if(event.key==='Escape')shareDismiss()">
  <div style="display:flex;gap:8px">
    <button class="ed-btn primary" id="share-confirm-btn" onclick="shareConfirm()" style="flex:1">share</button>
    <button class="ed-btn" onclick="shareDismiss()">cancel</button>
  </div>
</div>

<!-- collab import confirm overlay -->
<div id="cb-import-overlay" style="display:none;position:fixed;inset:0;background:rgba(8,12,16,0.92);z-index:51;align-items:center;justify-content:center">
  <div style="display:flex;flex-direction:column;gap:14px;align-items:center;padding:28px 32px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;min-width:280px;text-align:center">
    <div style="font-size:0.6rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase">import request</div>
    <div id="cb-import-desc" style="font-size:0.65rem;color:var(--text)"></div>
    <div id="cb-import-waiting" style="font-size:0.55rem;color:var(--muted)"></div>
    <div style="display:flex;gap:10px">
      <button class="ed-btn primary" onclick="cbImportVote(true)">accept</button>
      <button class="ed-btn danger" onclick="cbImportVote(false)">reject</button>
    </div>
  </div>
</div>

<!-- ═══ RADIO TAB ═══ -->
<div class="tab-panel active" id="panel-radio">
  <div class="radio-wrap">
    <div class="radio-bar">
      <div class="radio-bar-row">
        <div class="radio-title" id="radio-title"></div>
        <div class="radio-meta" id="radio-meta"></div>
        <div class="radio-spacer"></div>
        <div class="radio-time" id="radio-time">0:00 / 0:00</div>
        <input class="radio-vol-slider" id="radio-vol" type="range" min="0" max="1.15" step="0.01" value="0.8" oninput="radioSetVol(this.value)">
        <button class="radio-btn" id="radio-btn-playpause" onclick="radioTogglePlay()">▶</button>
        <button class="radio-btn" onclick="radioStop()" title="stop">■</button>
        <button class="radio-btn" id="radio-btn-loop" onclick="radioToggleLoop()" title="loop">⟳</button>
        <button class="radio-btn" id="radio-btn-shuffle" onclick="radioToggleShuffle()" title="shuffle">⇄</button>
        <button class="radio-btn" id="radio-btn-flats" onclick="radioToggleFlats()" title="toggle sharps/flats">#</button>
        <button class="radio-btn" onclick="radioNext()" title="next">⏭</button>
      </div>
      <div class="radio-progress" id="radio-progress-bar"><div class="radio-progress-fill" id="radio-progress-fill"></div></div>
    </div>
    <div class="radio-body">
      <div class="radio-sidebar" id="radio-sidebar">
        <div class="radio-loading" id="radio-loading" style="padding:20px;text-align:center">loading…</div>
      </div>
      <div class="radio-canvas-wrap">
        <canvas id="radio-canvas"></canvas>
        <div class="radio-idle-overlay" id="radio-idle-overlay">
          <div class="radio-idle-msg">pick a tune</div>
        </div>
        <div class="radio-legend hidden" id="radio-legend"></div>
      </div>
    </div>
  </div>
</div>

<script src="js/constants.js"></script>
<script src="js/grid-core.js"></script>
<script src="js/audio.js"></script>
<script src="js/live.js"></script>
<script src="js/midi-io.js"></script>
<script src="js/editor.js"></script>
<script src="js/collab.js"></script>
<script src="js/radio.js"></script>
<script src="js/init.js"></script>
</body>
</html>
